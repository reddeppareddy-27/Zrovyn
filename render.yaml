services:
  - type: web
    name: finance-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python setup_initial_data.py
    startCommand: gunicorn finance_backend.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11
    disk:
      name: logs
      mountPath: /opt/render/project/src/logs
      sizeGB: 1

  - type: pserv
    name: finance-postgres
    runtime: postgres
    ipAddress: 10.5.0.3
    databaseName: backend_intern
    user: backend_intern
    plan: starter
    postgresSQLVersion: 15
